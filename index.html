<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Shift & Scale — Ch. 12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f2ec;--paper:#fff;--sand:#e8e4db;--ink:#1a1714;--rule:#ccc8be;
  --blue:#1650a8;--green:#1a6e42;--red:#b83020;--amber:#c47a0a;
  --display:'Bebas Neue',Impact,sans-serif;
  --mono:'DM Mono',monospace;--body:'DM Sans',sans-serif;
}
html{background:var(--bg)}
body{font-family:var(--body);background:var(--bg);color:var(--ink);min-height:100vh;
  -webkit-font-smoothing:antialiased;padding:0}

/* MASTHEAD */
.masthead{border-bottom:3px solid var(--ink);padding:16px 24px 12px;
  display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:baseline}
.m-tag{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;opacity:.4;white-space:nowrap}
.m-title{font-family:var(--display);font-size:clamp(24px,6vw,52px);line-height:.92;
  text-align:center;letter-spacing:.02em}
.m-right{font-family:var(--mono);font-size:10px;opacity:.4;text-align:right;white-space:nowrap}
@media(max-width:480px){.masthead{grid-template-columns:1fr}.m-tag,.m-right{display:none}}

/* MODE TABS */
.mode-bar{display:flex;border-bottom:2px solid var(--ink);background:var(--paper)}
.mode-btn{flex:1;padding:13px 0;border:none;border-bottom:3px solid transparent;
  background:transparent;font-family:var(--display);font-size:clamp(18px,3.5vw,26px);
  letter-spacing:.04em;color:var(--ink);opacity:.35;cursor:pointer;margin-bottom:-2px;
  transition:all .15s;-webkit-tap-highlight-color:transparent}
.mode-btn.active{opacity:1;border-bottom-color:var(--ink)}

/* CONTROLS */
.controls-strip{padding:14px 24px;background:var(--sand);border-bottom:1px solid var(--rule);
  display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.ctrl-block{flex:1;min-width:180px;display:flex;flex-direction:column;gap:6px}
.ctrl-lbl{display:flex;justify-content:space-between;align-items:baseline}
.ctrl-lbl-text{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink);opacity:.4}
.ctrl-val{font-family:var(--display);font-size:28px;letter-spacing:.02em;line-height:1;color:var(--red)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;
  background:var(--rule);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
  width:22px;height:22px;border-radius:50%;background:var(--red);
  border:3px solid var(--bg);box-shadow:0 0 0 1.5px var(--red);cursor:pointer}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;
  background:var(--red);border:2px solid var(--bg);cursor:pointer}
select{padding:6px 10px;border:1.5px solid var(--rule);background:var(--paper);
  font-family:var(--mono);font-size:12px;color:var(--ink);outline:none;cursor:pointer;
  transition:border .12s}
select:focus{border-color:var(--blue)}

/* CANVAS PANELS */
.panels-section{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--rule)}
@media(max-width:540px){.panels-section{grid-template-columns:1fr}}
.canvas-panel{display:flex;flex-direction:column;border-right:1px solid var(--rule)}
.canvas-panel:last-child{border-right:none}
.cp-head{padding:10px 16px;border-bottom:1px solid var(--rule);
  font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink);opacity:.4}
canvas.dp-cvs{display:block;width:100%;background:var(--paper)}

/* MEAN BADGES */
.mean-band{display:flex;align-items:center;justify-content:center;gap:12px;
  padding:14px 24px;background:var(--paper);border-bottom:1px solid var(--rule);
  flex-wrap:wrap}
.mean-chip{padding:10px 16px;border:1.5px solid var(--rule);background:var(--sand);
  display:flex;flex-direction:column;gap:2px}
.mc-lbl{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink);opacity:.4}
.mc-val{font-family:var(--display);font-size:clamp(20px,3.5vw,30px);letter-spacing:.02em;line-height:1}
.mc-val.old{color:var(--blue)}
.mc-val.new{color:var(--green)}
.arrow{font-family:var(--display);font-size:28px;color:var(--ink);opacity:.3}

/* DATA CHIPS */
.chips-section{padding:12px 24px;border-bottom:1px solid var(--rule);
  display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip-lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink);opacity:.4;margin-right:4px;flex-shrink:0}
.chip{padding:4px 10px;border:1.5px solid var(--rule);font-family:var(--mono);font-size:13px;color:var(--ink)}
.chip.changed{border-color:var(--green);color:var(--green);background:rgba(26,110,66,.06)}

/* FORMULA STRIP */
.formula-strip{padding:16px 24px;background:var(--ink);border-bottom:1px solid var(--rule);
  font-family:var(--mono);font-size:12px;color:#f0ece3;line-height:1.9}
.fs-hl{color:#e8a840;font-weight:600}
.fs-green{color:#6ec891}

/* INSIGHT */
.insight-row{padding:16px 24px;display:grid;grid-template-columns:3px 1fr;gap:14px}
.ins-bar{background:var(--amber)}
.ins-text{font-size:13.5px;line-height:1.75;color:var(--ink);opacity:.7}
.ins-text strong{opacity:1}
</style>
</head>
<body>

<div class="masthead">
  <div class="m-tag">Ch. 12 · Data Handling</div>
  <div class="m-title">Shift &amp; Scale</div>
  <div class="m-right">Grade 8 · Oxford / Bhanzu</div>
</div>

<div class="mode-bar">
  <button class="mode-btn active" data-m="add">Add a constant</button>
  <button class="mode-btn" data-m="mul">Multiply by k</button>
</div>

<div class="controls-strip">
  <div class="ctrl-block">
    <div class="ctrl-lbl">
      <span class="ctrl-lbl-text" id="k-lbl">Add k</span>
      <span class="ctrl-val" id="k-disp">+0</span>
    </div>
    <input type="range" id="k-sl" min="-10" max="20" step="1" value="0">
  </div>
  <div class="ctrl-block">
    <div class="ctrl-lbl">
      <span class="ctrl-lbl-text">Dataset</span>
    </div>
    <select id="ds-sel">
      <option value="a">8,3,10,13,4,6,7,7,8,8,5 (textbook)</option>
      <option value="b">2,5,7,9,12</option>
      <option value="c">15,15,20,25,30,35</option>
    </select>
  </div>
</div>

<div class="panels-section">
  <div class="canvas-panel">
    <div class="cp-head">Original data</div>
    <canvas class="dp-cvs" id="dp-orig" height="220"></canvas>
  </div>
  <div class="canvas-panel">
    <div class="cp-head" id="new-panel-head">Transformed data</div>
    <canvas class="dp-cvs" id="dp-new" height="220"></canvas>
  </div>
</div>

<div class="mean-band">
  <div class="mean-chip">
    <div class="mc-lbl">Original mean</div>
    <div class="mc-val old" id="mean-old">—</div>
  </div>
  <div class="arrow">→</div>
  <div class="mean-chip">
    <div class="mc-lbl" id="new-mean-lbl">New mean</div>
    <div class="mc-val new" id="mean-new">—</div>
  </div>
</div>

<div class="chips-section">
  <span class="chip-lbl">Original</span>
  <div id="orig-chips"></div>
</div>
<div class="chips-section">
  <span class="chip-lbl">Transformed</span>
  <div id="new-chips"></div>
</div>

<div class="formula-strip" id="formula-strip"></div>

<div class="insight-row">
  <div class="ins-bar"></div>
  <p class="ins-text" id="main-insight"></p>
</div>

<script>
const DATASETS={
  a:[8,3,10,13,4,6,7,7,8,8,5],
  b:[2,5,7,9,12],
  c:[15,15,20,25,30,35],
};
let mode='add',k=0,mulK=2,ds='a';
function mean(arr){return arr.reduce((a,b)=>a+b,0)/arr.length;}
function fmt(n){return n%1===0?n.toString():(Math.round(n*1000)/1000).toString();}

function drawDotPlot(canvasId,values,label){
  const cvs=document.getElementById(canvasId);
  const PR=Math.min(window.devicePixelRatio||1,2);
  const W=cvs.parentElement.clientWidth;
  const H=220;
  cvs.width=W*PR;cvs.height=H*PR;cvs.style.width=W+'px';cvs.style.height=H+'px';
  const ctx=cvs.getContext('2d');ctx.scale(PR,PR);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  if(!values.length)return;
  const minV=Math.min(...values),maxV=Math.max(...values);
  const range=maxV-minV||1;
  const PAD=36,axY=H-24,R=9;
  const vx=v=>PAD+((v-minV)/range)*(W-PAD*2);

  // Axis
  ctx.beginPath();ctx.strokeStyle='#ccc8be';ctx.lineWidth=1.5;
  ctx.moveTo(PAD,axY);ctx.lineTo(W-PAD,axY);ctx.stroke();

  // Mean vertical line (tall, prominent)
  const m=mean(values);const mx=vx(m);
  ctx.beginPath();ctx.strokeStyle='#b83020';ctx.lineWidth=2;ctx.setLineDash([6,4]);
  ctx.moveTo(mx,8);ctx.lineTo(mx,axY);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#b83020';ctx.font='bold 10px DM Mono';ctx.textAlign='center';
  ctx.fillText('mean',mx,10);
  ctx.font='10px DM Mono';ctx.fillText(fmt(m),mx,21);

  // Stacked dots — tall!
  const counts={};values.forEach(v=>counts[v]=(counts[v]||0)+1);
  const distinct=[...new Set(values)].sort((a,b)=>a-b);
  distinct.forEach(v=>{
    const x=vx(v),cnt=counts[v];
    // Axis tick + label
    ctx.strokeStyle='#ccc8be';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,axY-3);ctx.lineTo(x,axY+3);ctx.stroke();
    ctx.fillStyle='#9a958e';ctx.font='10px DM Mono';ctx.textAlign='center';
    ctx.fillText(v,x,H-6);
    // Dots stacked upward
    for(let i=0;i<cnt;i++){
      const cy=axY-R-4-i*(R*2+2);
      ctx.beginPath();
      const isOrig=canvasId==='dp-orig';
      ctx.fillStyle=isOrig?'rgba(22,80,168,.75)':'rgba(26,110,66,.75)';
      ctx.arc(x,cy,R,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1;ctx.stroke();
    }
  });
  ctx.fillStyle='rgba(26,24,20,.3)';ctx.font='10px DM Mono';ctx.textAlign='left';
  ctx.fillText(label,PAD,H-8);
}

function renderChips(containerId,values,changed){
  const el=document.getElementById(containerId);
  el.innerHTML='';
  const row=document.createElement('div');
  row.style.cssText='display:flex;gap:5px;flex-wrap:wrap';
  values.forEach(v=>{
    const c=document.createElement('span');
    c.className='chip'+(changed?' changed':'');
    c.textContent=fmt(v);
    row.appendChild(c);
  });
  el.appendChild(row);
}

function update(){
  const orig=DATASETS[ds];
  const origMean=mean(orig);
  let transformed,newMean,label;

  if(mode==='add'){
    transformed=orig.map(v=>v+k);
    newMean=origMean+k;
    label=k===0?'(same as original)':k>0?`each value +${k}`:`each value ${k}`;
    document.getElementById('new-panel-head').textContent=label;
    document.getElementById('k-lbl').textContent='Add k';
    document.getElementById('k-disp').textContent=(k>=0?'+':'')+k;
  } else {
    transformed=orig.map(v=>v*mulK);
    newMean=origMean*mulK;
    label=`each value ×${mulK}`;
    document.getElementById('new-panel-head').textContent=label;
    document.getElementById('k-lbl').textContent='Multiply k';
    document.getElementById('k-disp').textContent='×'+mulK;
  }

  requestAnimationFrame(()=>{
    drawDotPlot('dp-orig',orig,'original');
    drawDotPlot('dp-new',transformed,label);
  });

  document.getElementById('mean-old').textContent=fmt(origMean);
  document.getElementById('mean-new').textContent=fmt(newMean);

  renderChips('orig-chips',orig,false);
  renderChips('new-chips',transformed,true);

  const fs=document.getElementById('formula-strip');
  const ins=document.getElementById('main-insight');
  if(mode==='add'){
    const kVal=k===0?'0':k>0?'+'+k:String(k);
    fs.innerHTML=
      `Adding <span class="fs-hl">${kVal}</span> to every value\n`+
      `New mean = old mean ${kVal} = ${fmt(origMean)} ${kVal} = <span class="fs-green">${fmt(newMean)}</span>\n`+
      `The dot plot SLIDES by ${Math.abs(k)} units — <span class="fs-hl">shape unchanged</span>, spacing unchanged.`;
    ins.innerHTML=k===0
      ?'Move the slider to see what adding a constant does to the data and its mean.'
      :`Adding <strong>${k>0?'+':'-'}${Math.abs(k)}</strong> to every value shifts the mean by the same amount — <strong>new mean = old mean + k</strong>. The dot plot slides along the number line but the <strong>shape stays identical</strong>. The spread (range, standard deviation) is unchanged.`;
  } else {
    fs.innerHTML=
      `Multiplying every value by <span class="fs-hl">×${mulK}</span>\n`+
      `New mean = old mean × ${mulK} = ${fmt(origMean)} × ${mulK} = <span class="fs-green">${fmt(newMean)}</span>\n`+
      `The dot plot <span class="fs-hl">STRETCHES</span> — spacing between dots grows by factor ${mulK}.`;
    ins.innerHTML=mulK===1
      ?'Move the slider to see what multiplying by a constant does.'
      :`Multiplying every value by <strong>×${mulK}</strong> multiplies the mean by the same amount — <strong>new mean = old mean × k</strong>. Unlike addition, the dot plot <strong>stretches</strong> — gaps between dots grow by the same factor. Outliers move further away.`;
  }
}

document.getElementById('k-sl').addEventListener('input',e=>{
  if(mode==='add'){k=+e.target.value;}else{mulK=+e.target.value;}update();
});
document.getElementById('ds-sel').addEventListener('change',e=>{ds=e.target.value;update();});
document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',()=>{
  mode=b.dataset.m;
  document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  const sl=document.getElementById('k-sl');
  if(mode==='add'){sl.min=-10;sl.max=20;sl.step=1;sl.value=0;k=0;}
  else{sl.min=0.5;sl.max=4;sl.step=0.5;sl.value=2;mulK=2;}
  update();
}));
window.addEventListener('resize',update);
update();
</script>
</body>
</html>
